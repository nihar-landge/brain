# ─── t3.micro optimized (1 GiB RAM) ───
# Before deploying, run on EC2:
#   sudo fallocate -l 2G /swapfile && sudo chmod 600 /swapfile
#   sudo mkswap /swapfile && sudo swapon /swapfile
#   echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab

services:
  database:
    image: postgres:16-alpine
    container_name: brain_db
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brain
    # Tune PostgreSQL for low-memory (t3.micro = 1 GiB RAM)
    command: >
      postgres
        -c shared_buffers=64MB
        -c work_mem=2MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=256MB
        -c max_connections=20
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U brain -d brain" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: brain_backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/ml/models:/app/ml/models
      - ./backend/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_KEY: ${API_SECRET_KEY:-}
        BASIC_AUTH_USER: ${BASIC_AUTH_USER:-nihar}
        BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-kalash@1}
    container_name: brain_frontend
    env_file:
      - ./backend/.env
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
